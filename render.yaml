services:
  - type: web
    name: quick-store
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
        placeholder: "Enter your Telegram Bot Token"
      - key: TELEGRAM_CHAT_ID
        sync: false
        placeholder: "Enter your Telegram Admin Chat ID"
      - key: TELEGRAM_ADMIN_USERNAME
        sync: false
        placeholder: "Enter your Telegram admin username (without @)"
      - key: FIREBASE_PROJECT_ID
        sync: false
        placeholder: "Optional: Your Firebase Project ID for cloud database"
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
        placeholder: "Optional: Your Firebase service account client email"
      - key: FIREBASE_PRIVATE_KEY
        sync: false
        placeholder: "Optional: Your Firebase service account private key (include begin/end private key headers)"
